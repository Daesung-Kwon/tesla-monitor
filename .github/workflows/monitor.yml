name: Tesla Monitor

on:
  schedule:
    # 15분마다 실행 (GitHub Actions는 최소 5분 간격)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write  # seen_articles.json 커밋을 위해 필요

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd python-monitor
          pip install -r requirements.txt
      
      - name: Create data directory
        run: mkdir -p python-monitor/data
      
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR: ./data
          KEYWORD_FILTER_ENABLED: ${{ secrets.KEYWORD_FILTER_ENABLED }}
          FILTER_KEYWORDS: ${{ secrets.FILTER_KEYWORDS }}
          MAX_ARTICLE_AGE_DAYS: ${{ secrets.MAX_ARTICLE_AGE_DAYS }}
        run: |
          cd python-monitor
          python monitor_rss.py
      
      - name: Commit and push seen articles
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add python-monitor/data/seen_articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Update seen articles [skip ci]"
          git push
        continue-on-error: true
